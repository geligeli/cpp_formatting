name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Cache Bazel repository cache
        uses: actions/cache@v4
        with:
          path: .bazel_cache
          key: bazel-repo-cache-ci-${{ runner.os }}-${{ hashFiles('MODULE.bazel', 'MODULE.bazel.lock') }}-${{ github.run_id }}
          restore-keys: |
            bazel-repo-cache-ci-${{ runner.os }}-${{ hashFiles('MODULE.bazel', 'MODULE.bazel.lock') }}-
            bazel-repo-cache-ci-${{ runner.os }}-

      - name: Cache Bazel Disk Cache
        uses: actions/cache@v4
        with:
          path: .disk_cache
          key: bazel-disk-cache-ci-${{ runner.os }}-${{ github.run_id }}
          restore-keys: |
            bazel-disk-cache-ci-${{ runner.os }}-

      - name: Build and test in devcontainer
        uses: devcontainers/ci@v0.3
        with:
          runCmd: |
            bazel test --disk_cache=/workspace/.disk_cache --repository_cache=/workspace/.bazel_cache //... --test_output=errors
