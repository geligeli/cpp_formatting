name: Release

on:
  push:
    branches: [main]

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Cache Bazel repository cache
        uses: actions/cache@v4
        with:
          path: .bazel_cache
          key: bazel-repo-cache-release-${{ runner.os }}-${{ hashFiles('MODULE.bazel', 'MODULE.bazel.lock') }}-${{ github.run_id }}
          restore-keys: |
            bazel-repo-cache-release-${{ runner.os }}-${{ hashFiles('MODULE.bazel', 'MODULE.bazel.lock') }}-
            bazel-repo-cache-release-${{ runner.os }}-

      - name: Cache Bazel Disk Cache
        uses: actions/cache@v4
        with:
          path: .disk_cache
          key: bazel-disk-cache-release-${{ runner.os }}-${{ github.run_id }}
          restore-keys: |
            bazel-disk-cache-release-${{ runner.os }}-

      - name: Build binary in devcontainer
        uses: devcontainers/ci@v0.3
        with:
          runCmd: |
            bazel build --disk_cache=/workspace/.disk_cache --repository_cache=/workspace/.bazel_cache --config=minify //cpp_formatting:cpp_format
            cp -L bazel-bin/cpp_formatting/cpp_format cpp_format-linux-x86_64

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="$(date -u +%Y%m%d)-$(git rev-parse --short HEAD)"
          gh release create "$TAG" cpp_format-linux-x86_64 \
            --title "$TAG" \
            --notes "Built from commit $(git rev-parse HEAD)"
